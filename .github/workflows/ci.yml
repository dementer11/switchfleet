name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python 3.12 checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -q

      - name: Compile Python files
        run: python -m compileall -q app src tests

      - name: Run ruff
        run: python -m ruff check app tests

      - name: Run mypy
        run: python -m mypy app

      - name: Check installed dependencies
        run: python -m pip check

      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist/wheelhouse .
